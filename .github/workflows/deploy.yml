name: Deploy Vite React to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build
        env:
          VITE_PUBLIC_SUPABASE_URL: ${{ secrets.VITE_PUBLIC_SUPABASE_URL }}
          VITE_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.VITE_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "mkdir -p /var/www/sendbillnow.com"
          rsync -avz --delete \
            --exclude='.env.production' \
            --exclude='api' \
            --exclude='server.mjs' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            dist/ \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/var/www/sendbillnow.com

          rsync -avz \
            api/ \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/var/www/sendbillnow.com/api

          rsync -avz \
            public/ \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/var/www/sendbillnow.com/public

          rsync -avz \
            server.mjs package.json package-lock.json \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/var/www/sendbillnow.com/

      - name: Sync production env
        env:
          VITE_PUBLIC_SUPABASE_URL: ${{ secrets.VITE_PUBLIC_SUPABASE_URL }}
          VITE_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.VITE_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RESEND_REPLY_TO: ${{ secrets.RESEND_REPLY_TO }}
        run: |
          if [ -n "$RESEND_API_KEY" ] && [ -n "$RESEND_FROM" ]; then
            cat > .env.production <<EOF
          VITE_PUBLIC_SUPABASE_URL=$VITE_PUBLIC_SUPABASE_URL
          VITE_PUBLIC_SUPABASE_ANON_KEY=$VITE_PUBLIC_SUPABASE_ANON_KEY
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY
          PUBLIC_BASE_URL=$PUBLIC_BASE_URL
          RESEND_API_KEY=$RESEND_API_KEY
          RESEND_FROM=$RESEND_FROM
          RESEND_REPLY_TO=$RESEND_REPLY_TO
          EOF
            grep -Eq '^RESEND_API_KEY=.+$' .env.production
            grep -Eq '^RESEND_FROM=.+$' .env.production
            rsync -avz .env.production ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/var/www/sendbillnow.com/.env.production
            ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "chmod 600 /var/www/sendbillnow.com/.env.production"
          else
            echo "Skipping .env.production upload because RESEND_API_KEY or RESEND_FROM is not configured in GitHub Secrets."
          fi

      - name: Install production dependencies and restart app
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "\
            cd /var/www/sendbillnow.com && \
            npm ci --omit=dev && \
            (pm2 delete sendbillnow || true) && \
            (pm2 delete wordnoticenter || true) && \
            pm2 start /var/www/sendbillnow.com/server.mjs --name sendbillnow --cwd /var/www/sendbillnow.com --update-env && \
            pm2 save"

      - name: Reload Nginx
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "sudo nginx -t && sudo systemctl reload nginx"

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
          rm -f .env.production

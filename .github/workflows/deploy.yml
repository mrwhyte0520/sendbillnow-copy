name: Deploy Vite React to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build
        env:
          VITE_PUBLIC_SUPABASE_URL: ${{ secrets.VITE_PUBLIC_SUPABASE_URL }}
          VITE_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.VITE_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "mkdir -p /var/www/sendbillnow.com"
          rsync -avz --delete \
            --exclude='.env.production' \
            --exclude='api' \
            --exclude='server.mjs' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            dist/ \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/var/www/sendbillnow.com

          rsync -avz \
            api/ \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/var/www/sendbillnow.com/api

          rsync -avz \
            server.mjs package.json package-lock.json \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/var/www/sendbillnow.com/

      - name: Restore production env
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "\
            rm -f /var/www/sendbillnow.com/.env.production && \
            touch /var/www/sendbillnow.com/.env.production && \
            chmod 600 /var/www/sendbillnow.com/.env.production && \
            { [ -n '${{ secrets.VITE_PUBLIC_SUPABASE_URL }}' ] && echo 'VITE_PUBLIC_SUPABASE_URL=${{ secrets.VITE_PUBLIC_SUPABASE_URL }}' >> /var/www/sendbillnow.com/.env.production || true; } && \
            { [ -n '${{ secrets.VITE_PUBLIC_SUPABASE_ANON_KEY }}' ] && echo 'VITE_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.VITE_PUBLIC_SUPABASE_ANON_KEY }}' >> /var/www/sendbillnow.com/.env.production || true; } && \
            { [ -n '${{ secrets.SUPABASE_URL }}' ] && echo 'SUPABASE_URL=${{ secrets.SUPABASE_URL }}' >> /var/www/sendbillnow.com/.env.production || true; } && \
            { [ -n '${{ secrets.SUPABASE_ANON_KEY }}' ] && echo 'SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}' >> /var/www/sendbillnow.com/.env.production || true; } && \
            { [ -n '${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' ] && echo 'SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' >> /var/www/sendbillnow.com/.env.production || true; } && \
            { [ -n '${{ secrets.PUBLIC_BASE_URL }}' ] && echo 'PUBLIC_BASE_URL=${{ secrets.PUBLIC_BASE_URL }}' >> /var/www/sendbillnow.com/.env.production || true; }"

      - name: Install production dependencies and restart app
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "\
            cd /var/www/sendbillnow.com && \
            npm ci --omit=dev && \
            (pm2 delete sendbillnow || true) && \
            (pm2 delete wordnoticenter || true) && \
            pm2 start /var/www/sendbillnow.com/server.mjs --name sendbillnow --cwd /var/www/sendbillnow.com --update-env && \
            pm2 save"

      - name: Reload Nginx
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "sudo nginx -t && sudo systemctl reload nginx"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa

name: Deploy Vite React to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build
        env:
          VITE_PUBLIC_SUPABASE_URL: ${{ secrets.VITE_PUBLIC_SUPABASE_URL }}
          VITE_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.VITE_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "mkdir -p /var/www/sendbillnow.com"
          rsync -avz --delete \
            --exclude='.env.production' \
            --exclude='api' \
            --exclude='server.mjs' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            dist/ \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/var/www/sendbillnow.com

          rsync -avz \
            api/ \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/var/www/sendbillnow.com/api

          rsync -avz \
            public/ \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/var/www/sendbillnow.com/public

          rsync -avz \
            server.mjs package.json package-lock.json \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/var/www/sendbillnow.com/

      - name: Restore production env
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "\
            set -e && \
            ENV_FILE=/var/www/sendbillnow.com/.env.production && \
            touch \$ENV_FILE && \
            chmod 600 \$ENV_FILE && \
            upsert_env() { \
              key=\"\$1\"; \
              value=\"\$2\"; \
              file=\"\$3\"; \
              tmp=\"\${file}.tmp\"; \
              grep -v \"^\${key}=\" \"\$file\" > \"\$tmp\" || true; \
              printf '%s=%s\n' \"\$key\" \"\$value\" >> \"\$tmp\"; \
              mv \"\$tmp\" \"\$file\"; \
            } && \
            { [ -n '${{ secrets.VITE_PUBLIC_SUPABASE_URL }}' ] && upsert_env 'VITE_PUBLIC_SUPABASE_URL' '${{ secrets.VITE_PUBLIC_SUPABASE_URL }}' \$ENV_FILE || true; } && \
            { [ -n '${{ secrets.VITE_PUBLIC_SUPABASE_ANON_KEY }}' ] && upsert_env 'VITE_PUBLIC_SUPABASE_ANON_KEY' '${{ secrets.VITE_PUBLIC_SUPABASE_ANON_KEY }}' \$ENV_FILE || true; } && \
            { [ -n '${{ secrets.SUPABASE_URL }}' ] && upsert_env 'SUPABASE_URL' '${{ secrets.SUPABASE_URL }}' \$ENV_FILE || true; } && \
            { [ -n '${{ secrets.SUPABASE_ANON_KEY }}' ] && upsert_env 'SUPABASE_ANON_KEY' '${{ secrets.SUPABASE_ANON_KEY }}' \$ENV_FILE || true; } && \
            { [ -n '${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' ] && upsert_env 'SUPABASE_SERVICE_ROLE_KEY' '${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \$ENV_FILE || true; } && \
            { [ -n '${{ secrets.PUBLIC_BASE_URL }}' ] && upsert_env 'PUBLIC_BASE_URL' '${{ secrets.PUBLIC_BASE_URL }}' \$ENV_FILE || true; } && \
            { [ -n '${{ secrets.RESEND_API_KEY }}' ] && upsert_env 'RESEND_API_KEY' '${{ secrets.RESEND_API_KEY }}' \$ENV_FILE || true; } && \
            { [ -n '${{ secrets.RESEND_FROM }}' ] && upsert_env 'RESEND_FROM' '${{ secrets.RESEND_FROM }}' \$ENV_FILE || true; } && \
            { [ -n '${{ secrets.RESEND_REPLY_TO }}' ] && upsert_env 'RESEND_REPLY_TO' '${{ secrets.RESEND_REPLY_TO }}' \$ENV_FILE || true; } && \
            grep -q '^RESEND_API_KEY=' \$ENV_FILE && \
            grep -q '^RESEND_FROM=' \$ENV_FILE"

      - name: Install production dependencies and restart app
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "\
            cd /var/www/sendbillnow.com && \
            npm ci --omit=dev && \
            (pm2 delete sendbillnow || true) && \
            (pm2 delete wordnoticenter || true) && \
            pm2 start /var/www/sendbillnow.com/server.mjs --name sendbillnow --cwd /var/www/sendbillnow.com --update-env && \
            pm2 save"

      - name: Reload Nginx
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} "sudo nginx -t && sudo systemctl reload nginx"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_rsa
